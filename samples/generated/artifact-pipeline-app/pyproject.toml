[project]
name = "artifact-pipeline-app"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.0,<3",
    "typer>=0.12,<1",
]

[project.scripts]
artifact_pipeline_app = "artifact_pipeline_app.interfaces.cli.app:main"

[dependency-groups]
dev = [
    "pytest>=8,<9",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artifact_pipeline_app"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
